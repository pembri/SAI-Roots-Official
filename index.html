<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f0f13, #1c1f2b);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 90%;
    max-width: 400px;
    padding: 35px 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    text-align: center;
    box-shadow: 0 15px 50px rgba(0,0,0,0.7);
}

.profile-img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.15);
    margin-bottom: 15px;
}

h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 25px;
}

/* BUTTON */
.link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 10px 0;
    padding: 14px;
    border-radius: 14px;
    text-decoration: none;
    color: white;
    font-size: 15px;
    background: rgba(255,255,255,0.08);
    transition: 0.3s;
}

.link:hover {
    background: rgba(255,255,255,0.18);
    transform: scale(1.03);
}

/* FOOTER */
.footer {
    margin-top: 25px;
    font-size: 11px;
    color: #888;
}
</style>

</head>
