<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music - SAI Roots</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h2{
  margin-top:25px;
  margin-bottom:10px;
  font-weight:600;
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding-bottom:5px;
}

.song{
  padding:12px 15px;
  margin:8px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:0.25s;
}

.song:hover{
  background:rgba(255,255,255,0.18);
  transform:translateX(5px);
}

.song.active{
  background:#1db954;
  color:#fff;
  font-weight:600;
}

.player{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  padding:10px 15px;
  box-shadow:0 -5px 15px rgba(0,0,0,0.5);
  display:flex;
  flex-direction:column;
  gap:5px;
}

#nowPlaying{
  font-size:14px;
  color:#ccc;
}

audio{
  width:100%;
  outline:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Single</h2>
<div class="song" onclick="playSong(this,'Drama Klenik',links.drama)">Drama Klenik <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Senandung Manis',links.senandung)">Senandung Manis <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Eksploitasi',links.eksploitasi)">Eksploitasi <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Jurus Liar',links.jurus)">Jurus Liar <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Dari Jauh',links.dari)">Dari Jauh <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Kasih Mengalun',links.kasih)">Kasih Mengalun <i class="fa-solid fa-play"></i></div>

<h2>Album: Critical Fire</h2>
<div class="song" onclick="playSong(this,'Babylon Burn',links.babylon)">Babylon Burn <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Bayang Singgasana',links.bayang)">Bayang Singgasana <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Blaze It Up',links.blaze)">Blaze It Up <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Evaluasi Lagi',links.evaluasi)">Evaluasi Lagi <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Irama Hidup',links.irama)">Irama Hidup <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Jamaican Sound',links.jamaican)">Jamaican Sound <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Ormas Tipu-tipu',links.ormas)">Ormas Tipu-tipu <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Propaganda',links.propaganda)">Propaganda <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Roots Medication',links.roots)">Roots Medication <i class="fa-solid fa-play"></i></div>
<div class="song" onclick="playSong(this,'Skank Patrol',links.skank)">Skank Patrol <i class="fa-solid fa-play"></i></div>

</div>

<div class="player">
<div id="nowPlaying">Pilih lagu</div>
<audio id="audioPlayer" controls></audio>
</div>

<script>
const audio=document.getElementById("audioPlayer");
const nowPlaying=document.getElementById("nowPlaying");
let currentSong=null;

const links={
  drama:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Drama%20Klenik.mp3",
  senandung:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Senandung%20Manis.mp3",
  eksploitasi:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Eksploitasi.mp3",
  jurus:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Jurus%20Liar.mp3",
  dari:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Dari%20Jauh.mp3",
  kasih:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Kasih%20Mengalun.mp3",
  babylon:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Babylon%20Burn.mp3",
  bayang:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Bayang%20Singgasana.mp3",
  blaze:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Blaze%20It%20Up.mp3",
  evaluasi:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Evaluasi%20Lagi.mp3",
  irama:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Irama%20Hidup.mp3",
  jamaican:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Jamaican%20Sound.mp3",
  ormas:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Ormas%20Tipu-tipu.mp3",
  propaganda:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Propaganda.mp3",
  roots:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Roots%20Medication.mp3",
  skank:"https://raw.githubusercontent.com/pembri/SAI-Roots-Official/main/Skank%20Patrol.mp3"
};

function playSong(el,title,url){
  document.querySelectorAll('.song').forEach(s=>{
    s.classList.remove('active');
  });
  el.classList.add('active');

  if(currentSong===url && !audio.paused){
    audio.pause();
    nowPlaying.innerText="Paused: "+title;
    return;
  }

  currentSong=url;
  audio.src=url;
  audio.load();
  audio.play().then(()=>{
    nowPlaying.innerText="Now Playing: "+title;
  }).catch(()=>{
    nowPlaying.innerText="Klik play manual ↓";
  });
}
</script>

</body>
</html>
